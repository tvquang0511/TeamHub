services:

  frontend:
    build: ../frontend
    container_name: teamhub-frontend
    ports:
      - "5173:5173"

  backend:
    build: ../backend
    container_name: teamhub-backend
    ports:
      - "4000:4000"

  worker:
    build: ../worker
    container_name: teamhub-worker

  postgres:
    image: postgres:15
    container_name: teamhub-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: teamhub
      POSTGRES_PASSWORD: teamhub
      POSTGRES_DB: teamhub
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: teamhub-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: teamhub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d

volumes:
  postgres_data: